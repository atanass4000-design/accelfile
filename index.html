<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Accel — File Sharing</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--surface:#0a0a0a;--surface2:#111;--surface3:#1a1a1a;
  --border:#222;--border-h:#444;--text:#fff;--muted:#888;--dim:#444;
  --accent:#fff;--accent-text:#000;--danger:#ff4444;--danger-dim:#3a1111;
  --success:#00ff88;--r:8px;--rs:6px;
  --font:'Geist',sans-serif;--mono:'Geist Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.app{display:flex;flex-direction:column;min-height:100vh}
header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600;letter-spacing:-.3px;text-decoration:none;color:var(--text)}
.logo-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--surface3);border:1px solid var(--border)}
.header-right{display:flex;align-items:center;gap:12px}
.account-btn{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-family:var(--font);cursor:pointer;transition:border-color .15s,background .15s}
.account-btn:hover{border-color:var(--border-h);background:var(--surface3)}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:11px;font-weight:600;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover}
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:80px 24px 120px}
.hero{text-align:center;margin-bottom:56px}
.hero h1{font-size:clamp(36px,6vw,64px);font-weight:700;letter-spacing:-2px;line-height:1.05;margin-bottom:16px}
.hero h1 span{color:var(--muted)}
.hero p{color:var(--muted);font-size:16px;max-width:480px;margin:0 auto}
.upload-wrap{width:100%;max-width:680px}
.upload-zone{position:relative;border:1.5px dashed var(--border);border-radius:12px;padding:64px 40px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--surface)}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--border-h);background:var(--surface2)}
.upload-zone.drag-over{border-color:#fff}
.upload-zone.disabled{cursor:not-allowed;opacity:.7}
.upload-zone h2{font-size:18px;font-weight:600;margin-bottom:8px}
.upload-zone p{color:var(--muted);font-size:13px;margin-bottom:24px}
.upload-input{display:none}
.upload-icon{width:48px;height:48px;margin:0 auto 20px;background:var(--surface3);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center}
.btn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;border:1px solid transparent;transition:opacity .15s,background .15s,border-color .15s,transform .1s;text-decoration:none}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:var(--accent-text);border-color:var(--accent)}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border)}
.btn-outline:hover{border-color:var(--border-h);background:var(--surface3)}
.btn-ghost{background:transparent;color:var(--muted);border-color:transparent}
.btn-ghost:hover{color:var(--text);background:var(--surface3)}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger-dim)}
.btn-danger:hover{background:#1a0808}
.btn-sm{padding:5px 10px;font-size:12px}
.file-list{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.file-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.file-icon{width:36px;height:36px;border-radius:6px;background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-family:var(--mono);color:var(--muted);font-weight:600;text-transform:uppercase}
.file-info{flex:1;min-width:0}
.file-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.file-meta{font-size:11px;color:var(--muted);font-family:var(--mono)}
.file-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;width:100%;max-width:400px;transform:translateY(8px) scale(.98);transition:transform .25s cubic-bezier(.34,1.56,.64,1);position:relative;box-shadow:0 16px 40px rgba(0,0,0,.6)}
.overlay.open .modal{transform:none}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:4px;display:flex;transition:color .15s,background .15s}
.modal-close:hover{color:var(--text);background:var(--surface3)}
.modal h2{font-size:18px;font-weight:600;margin-bottom:6px;letter-spacing:-.3px}
.modal-sub{color:var(--muted);font-size:13px;margin-bottom:24px;display:block}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;letter-spacing:.01em}
.field input{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s,box-shadow .15s}
.field input:focus{border-color:#555;box-shadow:0 0 0 3px rgba(255,255,255,.05)}
.field input::placeholder{color:var(--dim)}
.field input.inp-pfx{padding-left:28px}
.field input.inp-err{border-color:var(--danger)}
.inp-wrap{position:relative}
.inp-pfx-label{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:14px;pointer-events:none}
.profile-avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:24px}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:var(--surface3);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:28px;font-weight:700;position:relative;cursor:pointer}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.pa-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;border-radius:50%}
.profile-avatar:hover .pa-overlay{opacity:1}
.avatar-input{display:none}
.user-menu-wrap{position:relative}
.user-menu{position:absolute;top:calc(100% + 8px);right:0;width:220px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;opacity:0;pointer-events:none;transform:translateY(-8px) scale(.98);transition:opacity .2s,transform .2s;z-index:150;box-shadow:0 10px 30px rgba(0,0,0,.8)}
.user-menu.open{opacity:1;pointer-events:all;transform:none}
.user-menu-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface2)}
.umi .name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.umi .uname{font-size:11px;color:var(--muted);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.menu-item{width:100%;padding:10px 16px;background:none;border:none;color:var(--text);font-size:13px;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .12s;text-align:left}
.menu-item:hover{background:var(--surface3)}
.menu-item.danger{color:var(--danger)}
.menu-sep{height:1px;background:var(--border)}
.del-file{font-size:13px;font-weight:500;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;margin-bottom:20px;word-break:break-all;font-family:var(--mono)}
.del-warn{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(255,68,68,.08);border:1px solid var(--danger-dim);border-radius:var(--rs);margin-bottom:16px;font-size:12px;color:#ff8888}
.confirm-hint{font-size:12px;color:var(--muted);margin-bottom:8px}
.confirm-hint code{color:var(--text);background:var(--surface3);padding:1px 6px;border-radius:3px;font-family:var(--mono)}
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:13px;animation:toastIn .25s cubic-bezier(.34,1.56,.64,1);max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:opacity .3s,transform .3s}
@keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.toast.success .tdot{background:var(--success)}
.toast.error .tdot{background:var(--danger)}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.files-page{width:100%;max-width:800px;margin:0 auto}
.files-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.files-header h2{font-size:24px;font-weight:600;letter-spacing:-.5px}
.search-bar{width:100%;max-width:300px;position:relative}
.search-bar input{width:100%;padding:8px 12px 8px 36px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s;font-size:13px}
.search-bar input:focus{border-color:var(--border-h)}
.search-bar svg{position:absolute;left:12px;top:10px;color:var(--dim)}
footer{border-top:1px solid var(--border);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
footer span{color:var(--dim);font-size:12px;font-family:var(--mono)}
.footer-links{display:flex;gap:20px}
.footer-links a{color:var(--dim);font-size:12px;text-decoration:none;transition:color .15s}
.footer-links a:hover{color:var(--muted)}
.hidden{display:none!important}
.w-full{width:100%}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ══ AUTH MODAL CUSTOM STYLES ══ */
.auth-logo-row{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:28px}
.auth-brand-icon{width:40px;height:40px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center}
.auth-brand-name{font-size:20px;font-weight:700;letter-spacing:-.5px}
.auth-tagline{font-size:13px;color:var(--muted);margin-top:2px}

/* Big full-width input with floating label feel */
.auth-field{margin-bottom:12px;position:relative}
.auth-field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.auth-input{width:100%;padding:11px 14px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:8px;color:#fff;font-size:15px;font-family:var(--font);outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
.auth-input:focus{border-color:#555;box-shadow:0 0 0 3px rgba(255,255,255,.06)}
.auth-input::placeholder{color:#3a3a3a}
.auth-input.err{border-color:var(--danger);box-shadow:0 0 0 3px rgba(255,68,68,.1)}
.auth-err{font-size:12px;color:var(--danger);margin-top:5px;display:none}
.auth-err.show{display:block}

/* Password toggle */
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;cursor:pointer;font-size:12px;font-family:var(--font);font-weight:500;padding:4px 6px;border-radius:4px;transition:color .15s}
.pw-toggle:hover{color:#888}

/* Primary auth button */
.auth-btn{width:100%;padding:12px;background:#fff;color:#000;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;transition:background .15s,opacity .15s,transform .1s;margin-top:8px;letter-spacing:-.1px}
.auth-btn:hover{background:#e8e8e8}
.auth-btn:active{transform:scale(.99)}
.auth-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.auth-btn.loading{opacity:.7;cursor:not-allowed}

/* Divider */
.auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#333;font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:#1e1e1e}

/* Switch mode link */
.auth-switch{text-align:center;font-size:13px;color:var(--muted);margin-top:18px}
.auth-switch a{color:var(--text);text-decoration:none;font-weight:500;border-bottom:1px solid #333;padding-bottom:1px;transition:border-color .15s}
.auth-switch a:hover{border-color:#888}

/* Back link */
.auth-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--font);padding:0;margin-bottom:20px;transition:color .15s}
.auth-back:hover{color:var(--text)}

/* Step animation */
.auth-step{animation:stepIn .2s cubic-bezier(.34,1.4,.64,1) both}
@keyframes stepIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Spin */
.spin{width:13px;height:13px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:rot .5s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes rot{to{transform:rotate(360deg)}}

/* Account pill for setup step */
.acct-pill{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:8px;margin-bottom:20px}
.acct-pill-av{width:30px;height:30px;border-radius:50%;background:#1a1a1a;border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:#fff}
.acct-pill-info{flex:1;min-width:0}
.acct-pill-email{font-size:13px;color:var(--muted);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct-pill-check{color:var(--success);flex-shrink:0}
</style>
</head>
