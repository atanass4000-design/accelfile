<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script>
<script>
// ── Storage ────────────────────────────────────────────────────
const getReg = () => JSON.parse(localStorage.getItem('accel_reg') || '{}');
const setReg = r => localStorage.setItem('accel_reg', JSON.stringify(r));
const getFiles = () => JSON.parse(localStorage.getItem('accel_files') || '[]');
const setFiles = f => localStorage.setItem('accel_files', JSON.stringify(f));
const getSess = () => localStorage.getItem('accel_sess');
const setSess = id => id ? localStorage.setItem('accel_sess', id) : localStorage.removeItem('accel_sess');
const getCurrUser = () => { 
  const id = getSess(); 
  if (!id) return null; 
  return Object.values(getReg()).find(u => u.id === id) || null; 
};

// ── State ─────────────────────────────────────────────────────
let CU = null, pendingEmail = null, pendingPass = null, tmpSetupAv = null, tmpProfAv = null, pendingDelId = null;

window.addEventListener('DOMContentLoaded', () => {
  CU = getCurrUser();
  if (CU) {
    refreshHeader();
    renderFiles();
  }
});

// ── Modals ─────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (!document.querySelector('.overlay.open')) document.body.style.overflow = '';
}

function overlayClick(e, id) {
  if (e.target === document.getElementById(id)) closeModal(id);
}

function openAuth() {
  showStep('stepSignIn');
  openModal('authModal');
  setTimeout(() => document.getElementById('siEmail').focus(), 200);
}

function showStep(id) {
  ['stepSignIn','stepSignUp','stepProfile'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
  const el = document.getElementById(id);
  el.classList.remove('auth-step');
  void el.offsetWidth;
  el.classList.add('auth-step');
}

function switchToSignUp() {
  showStep('stepSignUp');
  setTimeout(() => document.getElementById('suEmail').focus(), 100);
}

function switchToSignIn() {
  showStep('stepSignIn');
  setTimeout(() => document.getElementById('siEmail').focus(), 100);
}

// ── Helpers ────────────────────────────────────────────────────
function clearErr(inputId, errId) {
  document.getElementById(inputId).classList.remove('err');
  const e = document.getElementById(errId);
  e.textContent = ''; 
  e.classList.remove('show');
}

function showErr(inputId, errId, msg) {
  document.getElementById(inputId).classList.add('err');
  const e = document.getElementById(errId);
  e.textContent = msg; 
  e.classList.add('show');
}

function togglePw(id, btn) {
  const i = document.getElementById(id);
  i.type = i.type === 'password' ? 'text' : 'password';
  btn.textContent = i.type === 'password' ? 'Show' : 'Hide';
}

function setLoading(btnId, on, label = 'Continue') {
  const b = document.getElementById(btnId);
  b.disabled = on;
  b.innerHTML = on ? `<span class="spin"></span>Processing...` : label;
}

function paOvl() {
  return `<div class="pa-overlay"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>`;
}

// ── Sign In ────────────────────────────────────────────────────
function doSignIn() {
  const email = document.getElementById('siEmail').value.trim().toLowerCase();
  const pass = document.getElementById('siPass').value;
  let ok = true;

  if (!email || !email.includes('@')) { 
    showErr('siEmail','siEmailErr','Enter a valid email address.'); 
    ok = false; 
  }
  if (!pass) { 
    showErr('siPass','siPassErr','Enter your password.'); 
    ok = false; 
  }
  if (!ok) return;

  setLoading('siBtnSubmit', true);
  
  setTimeout(() => {
    setLoading('siBtnSubmit', false, 'Continue');
    const reg = getReg();
    const user = reg[email];

    if (!user) { 
      showErr('siEmail','siEmailErr','No account found with this email.'); 
      return; 
    }
    if (user.password !== btoa(pass)) { 
      showErr('siPass','siPassErr','Incorrect password.'); 
      return; 
    }

    CU = user;
    setSess(user.id);
    refreshHeader();
    renderFiles();
    closeModal('authModal');
    toast(`Welcome back, @${user.username}! 👋`, 'success');
  }, 700);
}

// ── Sign Up step 1 ─────────────────────────────────────────────
function doSignUpStep1() {
  const email = document.getElementById('suEmail').value.trim().toLowerCase();
  const pass = document.getElementById('suPass').value;
  let ok = true;

  if (!email || !email.includes('@') || !email.includes('.')) { 
    showErr('suEmail','suEmailErr','Enter a valid email address.'); 
    ok = false; 
  }
  if (!pass || pass.length < 6) { 
    showErr('suPass','suPassErr','Password must be at least 6 characters.'); 
    ok = false; 
  }
  if (!ok) return;

  setLoading('suBtnNext', true);

  setTimeout(() => {
    setLoading('suBtnNext', false, 'Continue');
    const reg = getReg();
    if (reg[email]) {
      showErr('suEmail','suEmailErr','An account with this email already exists.');
      return;
    }

    pendingEmail = email;
    pendingPass = pass;

    const sugName = email.split('@')[0].replace(/[._\-]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    const sugUname = email.split('@')[0].replace(/[^a-zA-Z0-9_]/g,'').substring(0,20)||'user';

    document.getElementById('profPillAv').textContent = sugName.charAt(0).toUpperCase();
    document.getElementById('profPillEmail').textContent = email;

    document.getElementById('setupName').value = sugName;
    document.getElementById('setupUname').value = sugUname;

    tmpSetupAv = null;
    const ovl = paOvl();
    document.getElementById('setupAvEl').innerHTML = `<span id="setupAvInit">${sugName.charAt(0).toUpperCase()}</span>${ovl}`;

    showStep('stepProfile');
    setTimeout(() => document.getElementById('setupName').focus(), 100);
  }, 500);
}

function updateAvInit(v) {
  if (!tmpSetupAv) { 
    const e = document.getElementById('setupAvInit'); 
    if (e) e.textContent = v ? v.charAt(0).toUpperCase() : 'A'; 
  }
}

function handleSetupAv(inp) {
  const f = inp.files[0]; 
  if (!f) return;
  const r = new FileReader();
  r.onload = e => { 
    tmpSetupAv = e.target.result; 
    document.getElementById('setupAvEl').innerHTML = `<img src="${tmpSetupAv}" alt=""/>${paOvl()}`; 
  };
  r.readAsDataURL(f);
}

// ── Finish account creation ────────────────────────────────────
function finishSignup() {
  const name = document.getElementById('setupName').value.trim();
  const uname = document.getElementById('setupUname').value.trim().toLowerCase();
  let ok = true;

  if (!name) { 
    showErr('setupName','setupNameErr','Display name is required.'); 
    ok = false; 
  }
  if (!uname || uname.length < 2) { 
    showErr('setupUname','setupUnameErr','Username must be at least 2 characters.'); 
    ok = false; 
  }
  if (!ok) return;

  const reg = getReg();
  if (reg[pendingEmail]) { 
    showErr('suEmail','suEmailErr','This email is already registered.'); 
    switchToSignUp(); 
    return; 
  }
  if (Object.values(reg).some(u => u.username === uname)) {
    showErr('setupUname','setupUnameErr','That username is already taken.');
    return;
  }

  setLoading('setupBtn', true);

  setTimeout(() => {
    setLoading('setupBtn', false, 'Create account');

    const nu = {
      id: 'u_' + Date.now() + Math.random().toString(36).substr(2,5),
      email: pendingEmail,
      password: btoa(pendingPass),
      name,
      username: uname,
      avatarUrl: tmpSetupAv || null,
      avatarInitial: name.charAt(0).toUpperCase()
    };

    reg[pendingEmail] = nu;
    setReg(reg);

    CU = nu;
    setSess(nu.id);
    refreshHeader();
    renderFiles();
    closeModal('authModal');

    pendingEmail = null; 
    pendingPass = null; 
    tmpSetupAv = null;

    toast(`Welcome to Accel, @${uname}! 🎉`, 'success');
  }, 600);
}

// ── Sign out ───────────────────────────────────────────────────
function signOut() {
  CU = null;
  setSess(null);
  document.getElementById('hGuest').classList.remove('hidden');
  document.getElementById('hUser').classList.add('hidden');
  document.getElementById('uploadZone').classList.add('disabled');
  document.getElementById('homeFileList').innerHTML = '';
  document.getElementById('myFileList').innerHTML = '';
  closeMenu();
  showHome();
  toast('Signed out.', 'success');
}

// ── Header ─────────────────────────────────────────────────────
function refreshHeader() {
  document.getElementById('hGuest').classList.add('hidden');
  document.getElementById('hUser').classList.remove('hidden');
  document.getElementById('hName').textContent = CU.name.split(' ')[0];
  setAv('hAvatar', CU);
  setAv('mAvatar', CU);
  document.getElementById('mName').textContent = CU.name;
  document.getElementById('mUname').textContent = '@' + CU.username;
  document.getElementById('uploadZone').classList.remove('disabled');
}

function setAv(id, u) {
  const el = document.getElementById(id);
  el.innerHTML = u.avatarUrl
    ? `<img src="${u.avatarUrl}" alt="" onerror="this.parentElement.innerHTML='<span>${u.avatarInitial}</span>'" />`
    : `<span>${u.avatarInitial}</span>`;
}

// ── Menu ───────────────────────────────────────────────────────
function toggleMenu(e) { 
  if(e) e.stopPropagation(); 
  document.getElementById('userMenu').classList.toggle('open'); 
}

function closeMenu() { 
  document.getElementById('userMenu').classList.remove('open'); 
}

document.addEventListener('click', e => { 
  if (!e.target.closest('.user-menu-wrap')) closeMenu(); 
});

// ── Navigation ─────────────────────────────────────────────────
function showHome() {
  document.getElementById('homeView').classList.remove('hidden');
  document.getElementById('filesView').classList.add('hidden');
  closeMenu();
  renderFiles();
}

function showMyFiles() {
  closeMenu();
  if (!CU) { openAuth(); return; }
  document.getElementById('homeView').classList.add('hidden');
  document.getElementById('filesView').classList.remove('hidden');
  document.getElementById('searchInput').value = '';
  renderFiles();
}

// ── Profile edit ───────────────────────────────────────────────
function openProfile() {
  closeMenu();
  document.getElementById('profName').value = CU.name;
  document.getElementById('profUname').value = CU.username;
  tmpProfAv = CU.avatarUrl;

  const el = document.getElementById('profAvEl');
  el.innerHTML = CU.avatarUrl 
    ? `<img src="${CU.avatarUrl}" alt=""/>${paOvl()}` 
    : `<span id="profAvInit">${CU.avatarInitial}</span>${paOvl()}`;

  openModal('profileModal');
}

function handleProfAv(inp) {
  const f = inp.files[0]; 
  if (!f) return;
  const r = new FileReader();
  r.onload = e => { 
    tmpProfAv = e.target.result; 
    document.getElementById('profAvEl').innerHTML = `<img src="${tmpProfAv}" alt=""/>${paOvl()}`; 
  };
  r.readAsDataURL(f);
}

function saveProfile() {
  const name = document.getElementById('profName').value.trim();
  const uname = document.getElementById('profUname').value.trim().toLowerCase();

  if (!name) { toast('Display name is required.','error'); return; }
  if (!uname || uname.length < 2) { toast('Username too short.','error'); return; }

  const reg = getReg();
  if (Object.values(reg).some(u => u.username === uname && u.id !== CU.id)) {
    toast('That username is already taken.','error'); 
    return;
  }

  CU.name = name;
  CU.username = uname;
  CU.avatarUrl = tmpProfAv;
  CU.avatarInitial = name.charAt(0).toUpperCase();

  reg[CU.email] = CU;
  setReg(reg);

  refreshHeader();
  closeModal('profileModal');
  renderFiles();
  toast('Profile saved.', 'success');
}

// ── File upload ────────────────────────────────────────────────
function handleUploadClick() { 
  if (!CU) { openAuth(); return; } 
  document.getElementById('fileInput').click(); 
}

function onDragOver(e) { 
  e.preventDefault(); 
  if (!CU) return; 
  document.getElementById('uploadZone').classList.add('drag-over'); 
}

function onDragLeave(e) { 
  e.preventDefault(); 
  document.getElementById('uploadZone').classList.remove('drag-over'); 
}

function onDrop(e) {
  e.preventDefault(); 
  document.getElementById('uploadZone').classList.remove('drag-over');
  if (!CU) { openAuth(); return; }
  if (e.dataTransfer.files?.length) handleFiles(e.dataTransfer.files);
}

function handleFiles(files) {
  if (!files?.length) return;
  const all = getFiles();
  
  Array.from(files).forEach(f => {
    all.push({
      id: 'f_' + Date.now() + Math.random().toString(36).substr(2,5),
      name: f.name,
      size: (f.size / 1024 / 1024).toFixed(2) + ' MB',
      date: new Date().toLocaleDateString(),
      ownerId: CU.id,
      downloadUrl: URL.createObjectURL(f)
    });
  });

  setFiles(all);
  toast(`${files.length} file${files.length > 1 ? 's' : ''} uploaded successfully.`, 'success');
  renderFiles();
}

function filterFiles() {
  renderFiles(document.getElementById('searchInput').value);
}

function renderFiles(q = '') {
  if (!CU) return;

  const all = getFiles();
  const mine = all.filter(f => f.ownerId === CU.id).reverse();
  const filt = mine.filter(f => f.name.toLowerCase().includes(q.toLowerCase()));

  const row = f => `
    <div class="file-item">
      <div class="file-icon">${f.name.split('.').pop().substring(0,3).toUpperCase()}</div>
      <div class="file-info">
        <div class="file-name" title="${f.name}">${f.name}</div>
        <div class="file-meta">${f.size} · ${f.date}</div>
      </div>
      <div class="file-actions">
        <a href="${f.downloadUrl}" download="${f.name}" class="btn btn-outline btn-sm" onclick="toast('Downloading ${f.name}...','success')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </a>
        <button class="btn btn-ghost btn-sm" onclick="promptDel('${f.id}','${f.name.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </div>`;

  // My Files page
  const ml = document.getElementById('myFileList');
  if (ml) {
    ml.innerHTML = filt.length 
      ? filt.map(row).join('') 
      : `<p style="text-align:center;padding:48px 0;color:var(--dim);font-size:13px">
         ${q ? 'No files match your search.' : 'No files yet. Upload something!'}
         </p>`;
  }

  // Home recent uploads
  const hl = document.getElementById('homeFileList');
  if (hl) {
    const r = mine.slice(0, 3);
    hl.innerHTML = r.length 
      ? `<div style="margin-top:16px;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Recent Uploads</div>${r.map(row).join('')}` 
      : '';
  }
}

// ── Delete ─────────────────────────────────────────────────────
function promptDel(id, name) {
  pendingDelId = id;
  document.getElementById('delFileName').textContent = name;
  document.getElementById('delConfirmInp').value = '';
  document.getElementById('delConfirmBtn').disabled = true;
  openModal('deleteModal');
  setTimeout(() => document.getElementById('delConfirmInp').focus(), 280);
}

function onDelInput() {
  document.getElementById('delConfirmBtn').disabled = 
    document.getElementById('delConfirmInp').value !== 'confirm';
}

function execDelete() {
  if (!pendingDelId) return;
  setFiles(getFiles().filter(f => f.id !== pendingDelId));
  pendingDelId = null;
  closeModal('deleteModal');
  renderFiles(document.getElementById('searchInput')?.value || '');
  toast('File deleted permanently.', 'success');
}

// ── Toast ──────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const w = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `
    <div class="tdot"></div>
    <div>${msg}</div>
  `;
  w.appendChild(t);

  setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(20px)';
    setTimeout(() => t.remove(), 300);
  }, 3200);
}

// Close modals on Escape key
document.addEventListener('keydown', e => {
  if (e.key === "Escape") {
    const openOverlay = document.querySelector('.overlay.open');
    if (openOverlay) closeModal(openOverlay.id);
  }
});
</script>
