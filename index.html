<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Accel — File Sharing</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--surface:#0a0a0a;--surface2:#111;--surface3:#1a1a1a;
  --border:#222;--border-h:#444;--text:#fff;--muted:#888;--dim:#444;
  --accent:#fff;--accent-text:#000;--danger:#ff4444;--danger-dim:#3a1111;
  --success:#00ff88;--r:8px;--rs:6px;
  --font:'Geist',sans-serif;--mono:'Geist Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* Toast Container */
#toastWrap { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { 
    background: var(--surface2); color: var(--text); padding: 12px 16px; border-radius: var(--r); 
    border: 1px solid var(--border); font-size: 13px; font-weight: 500; min-width: 200px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideUp 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    display: flex; align-items: center; justify-content: space-between; pointer-events: auto;
}
.toast.error { border-color: var(--danger-dim); color: var(--danger); }
.toast.success { border-color: var(--success); }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.app{display:flex;flex-direction:column;min-height:100vh}
header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600;letter-spacing:-.3px;text-decoration:none;color:var(--text)}
.logo-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--surface3);border:1px solid var(--border)}
.header-right{display:flex;align-items:center;gap:12px}
.account-btn{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-family:var(--font);cursor:pointer;transition:border-color .15s,background .15s}
.account-btn:hover{border-color:var(--border-h);background:var(--surface3)}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:11px;font-weight:600;flex-shrink:0}

main{flex:1;display:flex;flex-direction:column;align-items:center;padding:80px 24px 120px}
.hero{text-align:center;margin-bottom:56px}
.hero h1{font-size:clamp(36px,6vw,64px);font-weight:700;letter-spacing:-2px;line-height:1.05;margin-bottom:16px}
.hero h1 span{color:var(--muted)}
.hero p{color:var(--muted);font-size:16px;max-width:480px;margin:0 auto}

.upload-wrap{width:100%;max-width:680px}
.upload-zone{position:relative;border:1.5px dashed var(--border);border-radius:12px;padding:64px 40px;text-align:center;cursor:pointer;transition:0.2s;background:var(--surface)}
.upload-zone:hover, .upload-zone.drag-over{border-color:var(--accent);background:var(--surface2)}
.upload-icon{width:48px;height:48px;margin:0 auto 20px;background:var(--surface3);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center}
.upload-input{display:none}

.btn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:0.15s;text-decoration:none}
.btn-primary{background:var(--accent);color:var(--accent-text)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:var(--surface3)}

.file-list{margin-top:24px;display:flex;flex-direction:column;gap:8px}
.file-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.file-icon{width:36px;height:36px;border-radius:6px;background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-family:var(--mono);color:var(--muted);text-transform:uppercase}
.file-info{flex:1;min-width:0}
.file-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:11px;color:var(--muted)}

.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;width:100%;max-width:400px;position:relative}
.field { margin-bottom: 16px; text-align: left; }
.field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.field input { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--rs); color: #fff; outline: none; }

.user-menu{position:absolute;top:calc(100% + 8px);right:0;width:180px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);display:none;flex-direction:column;padding:4px;z-index:1000;}
.user-menu.open{display:flex}
.menu-item{padding:8px 12px;background:none;border:none;color:var(--text);text-align:left;cursor:pointer;border-radius:4px;font-size:13px}
.menu-item:hover{background:var(--surface3)}
.menu-sep{height:1px;background:var(--border);margin:4px}
</style>
</head>
<body>

<div id="toastWrap"></div>

<div class="app">
    <header>
        <a href="#" class="logo">
            <div class="logo-icon">A</div>
            Accel
        </a>
        <div class="header-right">
            <div class="user-menu-wrap">
                <button class="account-btn" id="userBtn">
                    <div class="avatar" id="navAvatar">?</div>
                    <span id="navUsername">Guest</span>
                </button>
                <div class="user-menu" id="userMenu">
                    <button class="menu-item" onclick="openModal('profileModal')">Settings</button>
                    <div class="menu-sep"></div>
                    <button class="menu-item" style="color: var(--danger)" onclick="logout()">Sign Out</button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="hero">
            <h1>Share files <span>instantly.</span></h1>
            <p>Fast, secure, and ephemeral file sharing. Drag, drop, and send.</p>
        </div>

        <div class="upload-wrap">
            <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">↑</div>
                <h2>Click or drag files</h2>
                <p>Up to 500MB supported</p>
                <button class="btn btn-primary">Select Files</button>
                <input type="file" id="fileInput" class="upload-input" multiple />
            </div>
            <div class="file-list" id="fileList"></div>
        </div>
    </main>
</div>

<!-- Login Modal -->
<div class="overlay" id="loginModal">
    <div class="modal">
        <h2>Welcome back</h2>
        <p class="modal-sub">Enter a username to continue.</p>
        <div class="field">
            <label>Username</label>
            <input type="text" id="loginUser" placeholder="Enter name...">
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="login()">Login</button>
    </div>
</div>

<!-- Profile Modal -->
<div class="overlay" id="profileModal">
    <div class="modal">
        <button class="modal-close" style="position:absolute; right:15px; top:15px; color:#fff; background:none; border:none; cursor:pointer;" onclick="closeModal('profileModal')">✕</button>
        <h2>Settings</h2>
        <div class="field">
            <label>Display Name</label>
            <input type="text" id="editUsername">
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="saveProfile()">Save Changes</button>
    </div>
</div>

<script>
    // ── Toast System ──
    function toast(msg, type = 'success') {
        const wrap = document.getElementById('toastWrap');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerHTML = `<span>${msg}</span>`;
        wrap.appendChild(t);
        setTimeout(() => {
            t.style.opacity = '0';
            setTimeout(() => t.remove(), 300);
        }, 3000);
    }

    // State
    let user = { loggedIn: false, name: 'Guest' };

    // UI Handlers
    const userBtn = document.getElementById('userBtn');
    const userMenu = document.getElementById('userMenu');
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    userBtn.onclick = (e) => {
        e.stopPropagation();
        if(!user.loggedIn) return openModal('loginModal');
        userMenu.classList.toggle('open');
    };

    window.onclick = () => userMenu.classList.remove('open');

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    // Auth
    function login() {
        const val = document.getElementById('loginUser').value;
        if(!val) return toast('Please enter a name', 'error');
        user = { loggedIn: true, name: val };
        updateUI();
        closeModal('loginModal');
        toast(`Welcome, ${val}!`);
    }

    function logout() {
        user = { loggedIn: false, name: 'Guest' };
        updateUI();
        toast('Signed out');
    }

    function updateUI() {
        document.getElementById('navUsername').innerText = user.name;
        document.getElementById('navAvatar').innerText = user.name[0].toUpperCase();
        document.getElementById('editUsername').value = user.name;
    }

    function saveProfile() {
        const newName = document.getElementById('editUsername').value;
        if(newName) {
            user.name = newName;
            updateUI();
            toast('Profile updated');
        }
        closeModal('profileModal');
    }

    // File Handling
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
    dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        handleFiles(e.dataTransfer.files);
    };

    fileInput.onchange = (e) => handleFiles(e.target.files);

    function handleFiles(files) {
        if(files.length === 0) return;
        toast(`${files.length} file(s) added`);
        Array.from(files).forEach(file => {
            const size = (file.size / (1024 * 1024)).toFixed(2) + ' MB';
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `
                <div class="file-icon">${file.name.split('.').pop()}</div>
                <div class="file-info">
                    <div class="file-name">${file.name}</div>
                    <div class="file-meta">${size} • Ready to share</div>
                </div>
                <button class="btn btn-outline btn-sm" onclick="this.parentElement.remove()">Remove</button>
            `;
            document.getElementById('fileList').prepend(item);
        });
    }
</script>
</body>
</html>
